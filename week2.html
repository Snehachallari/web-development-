<!DOCTYPE html>
<html>
<head>
    <title>CSS Styling Methods Comparison</title>

    <!-- Internal CSS -->
    <style>
        h2 {
            color: blue;
            text-align: center;
        }

        .internal-box {
            background-color: lightgray;
            padding: 15px;
            margin: 10px;
        }
    </style>

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Inline CSS Example -->
    <h1 style="color: red; text-align: center;">
        CSS Styling Methods Comparison
    </h1>

    <section class="internal-box">
        <h2>Internal CSS Example</h2>
        <p>This section is styled using internal CSS.</p>
    </section>

    <section class="external-box">
        <h2>External CSS Example</h2>
        <p>This section is styled using external CSS.</p>
    </section>

</body>
</html>
